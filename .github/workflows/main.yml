on: [push, pull_request]

jobs:
  run_tests:
    runs-on: ubuntu-latest
    name: StochSS Continuous Testing
    container:
      image: 'stochss/Dockerfile'
    steps:
      # Checkout
    - name: Checkout
      id: checkout
      uses: actions/checkout@v2.1.0
      # Setup container & execute Python unit tests
    - name: run_tests.py
      id: run_tests
      uses: 'docker'
      with:
        image: 'Dockerfile'
        args:
        - '/stochss/stochss/tests/run_tests.py'
